<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FoodHub - Contact Us</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">

        <a class="navbar-brand fw-bold text-warning" href="index.html">
            🍔 FoodHub
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="menu.html">
                        Menu
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="cart.html">
                        Cart
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="contact.html">
                        Contact
                    </a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<!-- Header -->
<section class="bg-warning py-5 text-center">

    <div class="container">

        <h1 class="display-4 fw-bold">
            Contact Us
        </h1>

        <p class="lead">
            We'd love to hear from you!
        </p>

    </div>

</section>

<!-- Contact Section -->
<div class="container my-5">

    <div class="row g-4">

        <!-- Contact Form -->
        <div class="col-lg-7">

            <div class="card shadow border-0">

                <div class="card-body p-4">

                    <h3 class="mb-4">
                        Send Us a Message
                    </h3>

                    <form>

                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input type="text"
                                   class="form-control"
                                   placeholder="Enter your name"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email Address
                            </label>

                            <input type="email"
                                   class="form-control"
                                   placeholder="Enter your email"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Phone Number
                            </label>

                            <input type="tel"
                                   class="form-control"
                                   placeholder="Enter your phone number">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Message
                            </label>

                            <textarea class="form-control"
                                      rows="5"
                                      placeholder="Write your message here..."
                                      required></textarea>

                        </div>

                        <button type="submit"
                                class="btn btn-warning btn-lg">

                            <i class="fas fa-paper-plane"></i>
                            Send Message

                        </button>

                    </form>

                </div>

            </div>

        </div>

        <!-- Contact Details -->
        <div class="col-lg-5">

            <div class="card shadow border-0">

                <div class="card-body p-4">

                    <h3 class="mb-4">
                        Get In Touch
                    </h3>

                    <p>
                        <i class="fas fa-location-dot text-warning"></i>
                        Mumbai, Maharashtra, India
                    </p>

                    <p>
                        <i class="fas fa-phone text-warning"></i>
                        +91 9876543210
                    </p>

                    <p>
                        <i class="fas fa-envelope text-warning"></i>
                        support@foodhub.com
                    </p>

                    <p>
                        <i class="fas fa-clock text-warning"></i>
                        Open Daily: 10:00 AM - 11:00 PM
                    </p>

                    <hr>

                    <h5>Follow Us</h5>

                    <a href="#" class="btn btn-outline-dark me-2">
                        <i class="fab fa-facebook-f"></i>
                    </a>

                    <a href="#" class="btn btn-outline-dark me-2">
                        <i class="fab fa-instagram"></i>
                    </a>

                    <a href="#" class="btn btn-outline-dark me-2">
                        <i class="fab fa-twitter"></i>
                    </a>

                    <a href="#" class="btn btn-outline-dark">
                        <i class="fab fa-linkedin"></i>
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Map Section -->
<div class="container mb-5">

    <div class="card shadow border-0">

        <div class="card-body">

            <h3 class="mb-3">
                Our Location
            </h3>

            <div class="ratio ratio-16x9">

                <iframe
                    src="https://maps.google.com/maps?q=mumbai&t=&z=13&ie=UTF8&iwloc=&output=embed"
                    allowfullscreen>
                </iframe>

            </div>

        </div>

    </div>

</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3">

    <p class="mb-0">
        © 2026 FoodHub | DevOps Mini Project
    </p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
