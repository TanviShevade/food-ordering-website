<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FoodHub - Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">

        <a class="navbar-brand fw-bold text-warning" href="index.html">
            🍔 FoodHub
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="menu.html">
                        Menu
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="cart.html">
                        Cart
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="contact.html">
                        Contact
                    </a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<!-- Header -->
<section class="bg-warning text-dark py-5 text-center">
    <div class="container">

        <h1 class="display-5 fw-bold">
            <i class="fas fa-cart-shopping"></i>
            Shopping Cart
        </h1>

        <p class="lead">
            Review your selected food items
        </p>

    </div>
</section>

<!-- Cart Section -->
<div class="container my-5">

    <div class="card shadow-lg border-0">

        <div class="card-header bg-dark text-white">

            <h4 class="mb-0">
                <i class="fas fa-basket-shopping"></i>
                Cart Details
            </h4>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-warning">

                        <tr>
                            <th>Food Item</th>
                            <th>Price</th>
                            <th>Action</th>
                        </tr>

                    </thead>

                    <tbody id="cartBody">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- Total Card -->
    <div class="card shadow mt-4 border-0">

        <div class="card-body">

            <div class="row align-items-center">

                <div class="col-md-6">

                    <h3 class="fw-bold">
                        Total Amount
                    </h3>

                </div>

                <div class="col-md-6 text-md-end">

                    <h2 class="text-success fw-bold">
                        <span id="totalAmount">₹0</span>
                    </h2>

                </div>

            </div>

        </div>

    </div>

    <!-- Buttons -->
    <div class="text-center mt-4">

        <button class="btn btn-success btn-lg me-3"
                onclick="placeOrder()">

            <i class="fas fa-check-circle"></i>
            Place Order

        </button>

        <button class="btn btn-danger btn-lg"
                onclick="clearCart()">

            <i class="fas fa-trash"></i>
            Clear Cart

        </button>

    </div>

</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3 mt-5">

    <p class="mb-0">
        © 2026 FoodHub | DevOps Mini Project
    </p>

</footer>

<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
